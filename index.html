<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lost & Found Web App</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Lost & Found</h1>
        <div id="notificationBell" class="notification-bell" onclick="showNotifications()">
            🔔 <span id="notificationCount" class="notification-count">0</span>
        </div>
    </header>

    <nav>
        <button id="addItemBtn">Add Item</button>
        <button id="viewItemsBtn">View Items</button>
    </nav>

    <section id="addItemSection" class="section active">
        <h2>Add Item</h2>
        <form id="addItemForm">
            <label for="title">Title:</label>
            <input type="text" id="title" required>

            <label for="description">Description:</label>
            <textarea id="description" required></textarea>

            <label for="category">Category:</label>
            <select id="category" required>
                <option value="">Select Category</option>
                <option value="ID card">ID Card</option>
                <option value="Phone">Phone</option>
                <option value="Wallet">Wallet</option>
                <option value="Keys">Keys</option>
                <option value="Bag">Bag</option>
                <option value="Other">Other</option>
            </select>

            <label for="location">Location:</label>
            <div class="location-input">
                <input type="text" id="location" required>
                <button type="button" id="useLocationBtn">📍 Use My Location</button>
            </div>

            <label for="contact">Contact Info:</label>
            <input type="text" id="contact" required placeholder="Phone or Email">

            <label for="image">Upload Image:</label>
            <input type="file" id="image" accept="image/*">

            <label for="type">Type:</label>
            <select id="type" required>
                <option value="lost">Lost</option>
                <option value="found">Found</option>
            </select>

            <button type="submit">Submit</button>
        </form>
    </section>

    <section id="viewItemsSection" class="section">
        <h2>View Items</h2>
        <div id="searchFilter">
            <input type="text" id="search" placeholder="Search by item name">
            <select id="filterCategory">
                <option value="">All Categories</option>
                <option value="ID card">ID Card</option>
                <option value="Phone">Phone</option>
                <option value="Wallet">Wallet</option>
                <option value="Keys">Keys</option>
                <option value="Bag">Bag</option>
                <option value="Other">Other</option>
            </select>
            <select id="filterType">
                <option value="">All Types</option>
                <option value="lost">Lost</option>
                <option value="found">Found</option>
            </select>
        </div>
        <div id="itemsContainer">
            <div id="lostItems">
                <h3>Lost Items</h3>
                <div class="items"></div>
            </div>
            <div id="foundItems">
                <h3>Found Items</h3>
                <div class="items"></div>
            </div>
        </div>
    </section>

    <!-- Contact Modal -->
    <div id="contactModal" class="modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <h3>Send Message</h3>
            <p id="modalItemTitle"></p>
            <form id="messageForm">
                <label for="senderName">Your Name:</label>
                <input type="text" id="senderName" required>
                
                <label for="senderContact">Your Contact:</label>
                <input type="text" id="senderContact" required placeholder="Phone or Email">
                
                <label for="message">Message:</label>
                <textarea id="message" required placeholder="Describe how you found the item..."></textarea>
                
                <button type="submit">Send Message</button>
            </form>
        </div>
    </div>

    <!-- View Messages Modal -->
    <div id="messagesModal" class="modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <h3>Messages</h3>
            <div id="messagesList"></div>
        </div>
    </div>

    <!-- Notifications Modal -->
    <div id="notificationsModal" class="modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <h3>🔔 Notifications</h3>
            <div id="notificationsList"></div>
        </div>
    </div>

    <script src="firebase.js"></script>
    <script src="script.js"></script>
</body>

</html>
